name: Build and publish for VPS pull-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: deploy-rangeway-redesign
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build and verify
        run: |
          npm ci
          npm run check
          npm run build
          npm test

      # The VPS polls deploy-dist every two minutes and syncs it into
      # /var/www/rangeway-redesign. CI does not connect directly to the VPS.
      - name: Publish dist to deploy-dist branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publish_dir="$(mktemp -d)"
          git clone -q --branch deploy-dist --single-branch \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$publish_dir"
          rsync -a --delete --exclude=".git/" dist/ "$publish_dir/"
          cd "$publish_dir"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No Newsroom changes to publish"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy ${GITHUB_SHA}"
          git push -q origin deploy-dist
