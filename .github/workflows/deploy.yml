name: Build and publish for VPS pull-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-rangeway-redesign
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify and build
        run: |
          npm ci
          npm test
          npm run check
          npm run build

      # The VPS polls deploy-dist every two minutes and syncs it into
      # /var/www/rangeway-redesign. CI does not connect directly to the VPS.
      - name: Publish dist to deploy-dist branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init -q -b deploy-dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy ${GITHUB_SHA}"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" deploy-dist
